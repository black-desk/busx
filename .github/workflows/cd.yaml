name: Continuous Deployment

on:
  push:
    tags:
      - v*-*
    branches:
      - master

jobs:
  # Publishes busx to crates.io via Trusted Publishing (OIDC), so no
  # long-lived CARGO_REGISTRY_TOKEN secret is needed. See
  # https://crates.io/docs/trusted-publishing for the one-time setup
  # (manual first publish + register trusted publisher).
  crate:
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: black-desk/workflows/crate@master
        with:
          working-directory: crates/busx

  # Builds precompiled binaries (Linux + macOS, x86_64 + aarch64) and
  # publishes them to a GitHub Release. Config lives in
  # crates/busx/.goreleaser.yaml. Runs in parallel with `crate`; both
  # actions detect the version and tag locally without pushing, so they
  # do not interfere with each other.
  goreleaser:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: black-desk/workflows/goreleaser@master
        with:
          working-directory: crates/busx
