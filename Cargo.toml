[package]
name = "busx"
version = "0.1.0"
edition = "2024"
rust-version = "1.87"
description = "A zbus-based dbus-send/busctl/qdbus replacement"
license = "GPL-3.0-or-later"
repository = "https://github.com/black-desk/busx"

[dependencies]
zbus = { version = "5", default-features = false, features = ["blocking-api", "async-io"] }
zvariant = "5"
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
roxmltree = "0.20"
thiserror = "2"
anyhow = "1"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
nix = { version = "0.29", features = ["signal"] }
